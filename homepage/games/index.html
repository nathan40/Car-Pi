<title>Road Trip Games</title>
<style>
*{-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:system-ui,sans-serif;background:#0f1320;color:#fff}
body{padding:1.1rem 1.1rem 2rem}
header{display:flex;align-items:center;gap:.8rem;margin:.3rem auto 1.1rem;max-width:900px}
a.home{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;flex:none}
h1{font-size:1.45rem;margin:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(146px,1fr));gap:1rem;max-width:900px;margin:0 auto}
a.tile{aspect-ratio:1;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.45rem;text-decoration:none;color:#fff;font-weight:700;font-size:1.02rem;box-shadow:0 6px 0 rgba(0,0,0,.3);transition:transform .08s ease}
a.tile:active{transform:scale(.94)}
.e{font-size:3.1rem;line-height:1}
</style>
</head>
