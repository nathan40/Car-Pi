<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ten-Frame Frenzy</title>
<style>
*{-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,sans-serif;background:#1994a8}
#top{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:8px;padding:10px;z-index:9}
a.home,.lvl{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;border:3px solid transparent;color:#fff;flex:none}
.lvl.sel{border-color:#fff;background:rgba(255,255,255,.32)}
#stars{margin-left:auto;color:#fff;font-weight:800;font-size:1.3rem}
#stage{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:70px 3vmin calc(16px + env(safe-area-inset-bottom))}
#combo{color:#fff;font-weight:800;font-size:1.1rem;text-shadow:0 2px 4px rgba(0,0,0,.35);min-height:1.4rem}
#ask{color:#fff;font-size:clamp(1.1rem,5vmin,1.6rem);font-weight:700;text-align:center}
#frame{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(2,1fr);gap:1.4vmin;width:min(74vmin,420px);aspect-ratio:5/2;background:rgba(255,255,255,.15);padding:1.6vmin;border-radius:16px}
.cell{background:rgba(255,255,255,.25);border-radius:10px;display:flex;align-items:center;justify-content:center}
.cell.on{background:#fdf6ec}
.cell.on .dot{font-size:clamp(1.6rem,7vmin,2.6rem)}
#numbers{display:flex;flex-wrap:wrap;gap:1.6vmin;justify-content:center;max-width:94vw}
.num{width:clamp(3.6rem,16vmin,5.4rem);height:clamp(3.6rem,16vmin,5.4rem);border-radius:16px;background:#fdf6ec;color:#2b3a44;display:flex;align-items:center;justify-content:center;font-size:clamp(1.8rem,7.5vmin,2.6rem);font-weight:800;box-shadow:0 5px 0 rgba(0,0,0,.3);transition:transform .1s}
.num:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.3)}
.num.no{animation:shake .35s ease}
@keyframes shake{20%{transform:translateX(-8px)}45%{transform:translateX(8px)}70%{transform:translateX(-5px)}90%{transform:translateX(4px)}}
#frenzy{color:#fff;font-weight:800;font-size:1.1rem}
#fx{position:fixed;inset:0;pointer-events:none;z-index:11}
</style>
</head>
<body>
<div id="top">
  <a class="home" href="index.html">🏠</a>
  <div class="lvl sel" id="mk10">🔟</div>
  <div class="lvl" id="addmode">➕</div>
  <div class="lvl" id="frenzybtn">⏱️</div>
  <div id="stars">⭐ 0</div>
</div>
<div id="stage">
  <div id="frenzy"></div>
  <div id="ask">Make 10!</div>
  <div id="frame"></div>
  <div id="combo"></div>
  <div id="numbers"></div>
</div>
<canvas id="fx"></canvas>
<script src="shared/players.js"></script>
<script>
document.addEventListener('contextmenu',function(e){e.preventDefault()});
var AC=window.AudioContext||window.webkitAudioContext,actx=null;
function A(){actx=actx||new AC();if(actx.state==='suspended')actx.resume();return actx}
function tone(f,d,type,v,f2,t){t=t||0;try{var a=A(),o=a.createOscillator(),g=a.createGain(),s=a.currentTime+t;
o.type=type||'sine';o.frequency.setValueAtTime(f,s);if(f2)o.frequency.exponentialRampToValueAtTime(f2,s+d);
g.gain.setValueAtTime(v||.25,s);g.gain.exponentialRampToValueAtTime(.001,s+d);
o.connect(g);g.connect(a.destination);o.start(s);o.stop(s+d+.05)}catch(e){}}
function confetti(){
  var cv=document.getElementById('fx'),cx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  var P=[];for(var i=0;i<110;i++)P.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.5,
    r:4+Math.random()*6,c:'hsl('+(Math.random()*360)+',90%,60%)',vy:2+Math.random()*3,vx:-1+Math.random()*2,a:Math.random()*6});
  var t=0;
  (function f(){
    cx.clearRect(0,0,cv.width,cv.height);
    P.forEach(function(p){p.y+=p.vy;p.x+=p.vx;p.a+=.1;
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.a);cx.fillStyle=p.c;
      cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);cx.restore();});
    if(t++<200)requestAnimationFrame(f);else cx.clearRect(0,0,cv.width,cv.height);
  })();
}
function store(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem(k));localStorage.setItem(k,JSON.stringify(v))}catch(e){return null}}

var frameEl=document.getElementById('frame'),numsEl=document.getElementById('numbers');
var askEl=document.getElementById('ask'),starsEl=document.getElementById('stars'),comboEl=document.getElementById('combo');
var frenzyEl=document.getElementById('frenzy');
var cells=[];
for(var i=0;i<10;i++){var c=document.createElement('div');c.className='cell';c.innerHTML='<span class="dot">🔵</span>';frameEl.appendChild(c);cells.push(c)}

var mode='mk10',filled=0,answer=0,locked=false,combo=0,accuracy=[],starCount=store('tf_stars')||0;
var frenzyOn=false,frenzyTimer=null,frenzyLeft=0,profile=null;
starsEl.textContent='⭐ '+starCount;

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.random()*(i+1)|0,t=a[i];a[i]=a[j];a[j]=t}return a}

function paintFrame(n){
  for(var i=0;i<10;i++)cells[i].classList.toggle('on',i<n);
}

function round(){
  locked=false;
  if(mode==='mk10'){
    filled=1+(Math.random()*8|0);
    paintFrame(filled);
    answer=10-filled;
    askEl.textContent='Make 10! How many more?';
  }else{
    filled=1+(Math.random()*9|0);
    var addend=1+(Math.random()*(10-filled)|0);
    paintFrame(Math.min(10,filled));
    answer=filled+addend;
    askEl.textContent=filled+' + '+addend+' = ?';
  }
  var choices=[answer];
  while(choices.length<4){
    var d=Math.max(0,answer+(Math.random()*5|0)-2);
    if(d!==answer&&choices.indexOf(d)<0&&d<=20)choices.push(d);
  }
  numsEl.innerHTML='';
  shuffle(choices).forEach(function(n){
    var b=document.createElement('div');b.className='num';b.textContent=n;
    b.addEventListener('pointerdown',function(){pick(n,b)});
    numsEl.appendChild(b);
  });
}

function pick(n,btn){
  A();
  if(locked)return;
  if(n===answer){
    locked=true;
    combo++;accuracy.push(1);
    starCount++;starsEl.textContent='⭐ '+starCount;store('tf_stars',starCount);
    if(profile)Players.award(profile,1);
    comboEl.textContent=combo>=3?('🔥 Combo x'+combo):'';
    tone(523,.15,'triangle',.3);tone(659,.15,'triangle',.3,0,.1);
    if(combo>0&&combo%5===0){tone(784,.25,'triangle',.32,0,.2);confetti()}
    setTimeout(round,700);
  }else{
    combo=0;comboEl.textContent='';accuracy.push(0);
    btn.classList.remove('no');void btn.offsetWidth;btn.classList.add('no');
    tone(180,.18,'square',.18,150);
  }
  var recent=accuracy.slice(-8);
  if(!frenzyOn&&recent.length>=8&&recent.reduce(function(a,b){return a+b},0)>=7){
    frenzyEl.textContent='⏱️ Frenzy unlocked — tap the timer!';
  }
}

document.getElementById('mk10').addEventListener('pointerdown',function(){
  mode='mk10';this.classList.add('sel');document.getElementById('addmode').classList.remove('sel');combo=0;comboEl.textContent='';round();
});
document.getElementById('addmode').addEventListener('pointerdown',function(){
  mode='add';this.classList.add('sel');document.getElementById('mk10').classList.remove('sel');combo=0;comboEl.textContent='';round();
});
document.getElementById('frenzybtn').addEventListener('pointerdown',function(){
  if(frenzyOn)return;
  frenzyOn=true;frenzyLeft=60;
  frenzyEl.textContent='⏱️ 60';
  frenzyTimer=setInterval(function(){
    frenzyLeft--;
    frenzyEl.textContent='⏱️ '+frenzyLeft;
    if(frenzyLeft<=0){
      clearInterval(frenzyTimer);frenzyOn=false;
      frenzyEl.textContent='🎉 Frenzy done!';
      confetti();
      setTimeout(function(){frenzyEl.textContent=''},2000);
    }
  },1000);
});

Players.init(function(p){profile=p;round()});
</script>
</body>
</html>
