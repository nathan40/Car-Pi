<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Animal Sounds</title>
<style>
*{-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:system-ui,sans-serif;background:#f7ead2}
body{padding:70px 3vmin 3vmin}
a.home{position:fixed;top:10px;left:10px;width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;z-index:9}
#grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2.2vmin;max-width:820px;margin:0 auto}
@media (orientation:landscape){#grid{grid-template-columns:repeat(4,1fr)}}
.a{aspect-ratio:1;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;box-shadow:0 5px 0 rgba(0,0,0,.18);cursor:pointer;touch-action:manipulation}
.a .e{font-size:clamp(2.6rem,12vmin,4.6rem);line-height:1;transition:transform .1s}
.a .n{font-size:.85rem;font-weight:700;color:rgba(0,0,0,.55)}
.a.boing .e{animation:boing .45s ease}
@keyframes boing{0%{transform:scale(1)}35%{transform:scale(1.35) rotate(-6deg)}65%{transform:scale(.92) rotate(4deg)}100%{transform:scale(1)}}
</style>
</head>
<body>
<a class="home" href="index.html">🏠</a>
<div id="grid"></div>
<script>
document.addEventListener('contextmenu',function(e){e.preventDefault()});
var AC=window.AudioContext||window.webkitAudioContext,actx=null;
function A(){actx=actx||new AC();if(actx.state==='suspended')actx.resume();return actx}
function tone(f,d,type,v,f2,t){t=t||0;try{var a=A(),o=a.createOscillator(),g=a.createGain(),s=a.currentTime+t;
o.type=type||'sine';o.frequency.setValueAtTime(f,s);if(f2)o.frequency.exponentialRampToValueAtTime(f2,s+d);
g.gain.setValueAtTime(v||.25,s);g.gain.exponentialRampToValueAtTime(.001,s+d);
o.connect(g);g.connect(a.destination);o.start(s);o.stop(s+d+.05)}catch(e){}}
function noise(d,v,fq,t){t=t||0;try{var a=A(),len=a.sampleRate*d,b=a.createBuffer(1,len,a.sampleRate),ch=b.getChannelData(0);
for(var i=0;i<len;i++)ch[i]=Math.random()*2-1;
var src=a.createBufferSource();src.buffer=b;
var f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=fq||1000;
var g=a.createGain(),s=a.currentTime+t;
g.gain.setValueAtTime(v||.2,s);g.gain.exponentialRampToValueAtTime(.001,s+d);
src.connect(f);f.connect(g);g.connect(a.destination);src.start(s)}catch(e){}}

var ANIMALS=[
 ['🐶','Dog','#ffd9a0',function(){noise(.06,.25,700);tone(180,.15,'sawtooth',.32,90);noise(.06,.25,700,.22);tone(180,.15,'sawtooth',.32,90,.22)}],
 ['🐱','Cat','#ffc9d8',function(){tone(520,.15,'sine',.26,900);tone(900,.32,'sine',.26,420,.15)}],
 ['🐮','Cow','#d8e8ff',function(){tone(175,.25,'sawtooth',.28,145);tone(145,.6,'sawtooth',.3,105,.22);tone(85,.7,'sine',.2,68,.1)}],
 ['🦆','Duck','#fff3b0',function(){for(var i=0;i<3;i++){tone(420,.09,'sawtooth',.3,240,i*.14);noise(.05,.12,1500,i*.14)}}],
 ['🐸','Frog','#c9f2c7',function(){tone(140,.1,'square',.24,100);tone(135,.14,'square',.24,88,.18)}],
 ['🐷','Pig','#ffd6e8',function(){noise(.09,.2,500);tone(160,.1,'square',.26,110,.02);noise(.09,.2,500,.2);tone(170,.1,'square',.26,115,.22)}],
 ['🐑','Sheep','#eee5f8',function(){for(var i=0;i<5;i++)tone(i%2?345:300,.09,'sawtooth',.24,0,i*.09)}],
 ['🦁','Lion','#ffe0b0',function(){noise(.75,.3,300);tone(110,.75,'sawtooth',.28,62);tone(55,.75,'sine',.24,44)}],
 ['🐘','Elephant','#dbe4ea',function(){tone(250,.28,'sawtooth',.3,620);tone(620,.35,'sawtooth',.3,340,.26)}],
 ['🦉','Owl','#e3d5c3',function(){tone(420,.25,'sine',.22,380);tone(400,.38,'sine',.22,330,.35)}],
 ['🐵','Monkey','#f5d7b8',function(){tone(450,.1,'square',.22,700);tone(450,.1,'square',.22,700,.15);tone(760,.24,'square',.24,380,.3)}],
 ['🐔','Chicken','#fde2c8',function(){for(var i=0;i<4;i++)tone(620-i*30,.06,'square',.2,470,i*.11)}]
];

var grid=document.getElementById('grid');
ANIMALS.forEach(function(an){
  var d=document.createElement('div');
  d.className='a';
  d.style.background=an[2];
  d.innerHTML='<span class="e">'+an[0]+'</span><span class="n">'+an[1]+'</span>';
  d.addEventListener('pointerdown',function(){
    A();an[3]();
    d.classList.remove('boing');void d.offsetWidth;d.classList.add('boing');
  });
  grid.appendChild(d);
});
</script>
</body>
</html>
